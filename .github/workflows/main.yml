name: Criar Meu APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extrair Tudo e Corrigir Pastas
        run: |
          # Extrai o projeto e os patches
          unzip -o projeto.zip || true
          unzip -o patches.zip || true
          
          # TRUQUE: Se os patches estiverem numa pasta chamada 'patches', 
          # mas o ZIP criou outra pasta 'patches' dentro, isso resolve:
          if [ -d "patches" ]; then
            echo "Pasta patches encontrada."
          else
            # Tenta localizar onde o package.json e a pasta patches foram parar
            find . -name "package.json" -exec sh -c 'mv "$(dirname "{}")"/* .' \; || true
          fi
          ls -R patches # Mostra pro suporte (eu) se os arquivos estão lá

      - name: Configurar Node e PNPM
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Instalar Dependencias
        run: |
          npm install -g pnpm
          # O segredo: instalamos ignorando os scripts primeiro para não travar no patch
          pnpm install --no-frozen-lockfile --ignore-scripts
          pnpm run build --if-present

      - name: Preparar Capacitor
        run: |
          pnpm add @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p dist
          npx cap init "MeuApp" "com.meu.app" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-projeto-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
