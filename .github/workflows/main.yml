name: Criar Meu APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extrair pastas (se houver ZIPs)
        run: |
          # Se você subiu a pasta client como client.zip, ele extrai aqui
          if [ -f "client.zip" ]; then unzip -o client.zip; fi
          if [ -f "projeto.zip" ]; then unzip -o projeto.zip; fi

      - name: Configurar Node e PNPM
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Instalar Dependencias
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile
          pnpm run build --if-present

      - name: Preparar Capacitor
        run: |
          pnpm add @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p dist
          # Se o seu build gerou arquivos em outra pasta, movemos para 'dist'
          cp -r client/dist/* dist/ 2>/dev/null || true
          npx cap init "MeuApp" "com.meu.app" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar APK
        run: |
          cd android
          # Dá permissão para o executor do Android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-projeto-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
