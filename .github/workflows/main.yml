name: Criar Meu APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extrair Arquivos
        run: |
          # Extrai todos os zips que você subiu
          unzip -o projeto.zip || true
          unzip -o client.zip || true
          unzip -o patches.zip || true
          
          # Se os arquivos estiverem numa subpasta, move para a raiz
          find . -maxdepth 2 -name "package.json" -exec sh -c 'mv "$(dirname "{}")"/* . 2>/dev/null' \; || true
          
          # CRUCIAL: Se a pasta client não existir, cria ela e garante que tenha um index.html
          mkdir -p client
          if [ ! -f "client/index.html" ] && [ -f "index.html" ]; then
            cp index.html client/index.html
          fi

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Instalar e Build
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile --ignore-scripts
          # Tenta o build. Se falhar por falta de arquivo, o próximo passo contorna
          pnpm run build || echo "Build falhou, mas tentaremos seguir com o Capacitor"

      - name: Preparar Capacitor
        run: |
          pnpm add @capacitor/core @capacitor/cli @capacitor/android
          # O Capacitor precisa de uma pasta com o site. Se o build falhou, usamos a pasta client
          mkdir -p dist
          cp -r client/* dist/ 2>/dev/null || true
          npx cap init "MeuApp" "com.meu.app" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-projeto-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
