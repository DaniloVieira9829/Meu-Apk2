name: Criar Meu APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Listar e Extrair
        run: |
          echo "Verificando arquivos no repositório:"
          ls -R
          # Tenta descompactar qualquer arquivo .zip que encontrar
          unzip *.zip || echo "Nenhum zip encontrado"
          
      - name: Localizar Projeto e Mover
        run: |
          # Procura onde está o package.json e move tudo para a raiz
          CAMINHO=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          DIRETORIO=$(dirname $CAMINHO)
          echo "Projeto encontrado em: $DIRETORIO"
          cp -rn $DIRETORIO/. . || true
          
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar pnpm e Dependencias
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile
          pnpm run build --if-present

      - name: Configurar Capacitor e Android
        run: |
          pnpm add @capacitor/core @capacitor/cli @capacitor/android
          # Se não existir a pasta dist, cria uma vazia para não dar erro no init
          mkdir -p dist
          npx cap init "MeuApp" "com.meu.app" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Gerar o APK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-projeto-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
