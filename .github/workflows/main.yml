name: Criar Meu APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extrair e Organizar
        run: |
          unzip -o projeto.zip || true
          unzip -o client.zip || true
          unzip -o patches.zip || true
          # Se os arquivos estiverem dentro de uma pasta 'client', move o index para a raiz se necessário
          if [ -f "client/index.html" ] && [ ! -f "index.html" ]; then cp client/index.html .; fi

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Atualizado para a versão que o Capacitor exige

      - name: Instalar e Build
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile --ignore-scripts
          # Tenta rodar o build. Se falhar, criamos a pasta dist manualmente
          pnpm run build || mkdir -p dist

      - name: Preparar Capacitor
        run: |
          pnpm add @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          # Garante que a pasta 'dist' tenha o conteúdo do seu site
          mkdir -p dist
          if [ -d "client/dist" ]; then cp -r client/dist/* dist/; fi
          if [ -f "client/index.html" ] && [ ! -f "dist/index.html" ]; then cp -r client/* dist/; fi
          
          npx cap init "MeuApp" "com.meu.app" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-projeto-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          name: meu-projeto-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
