name: Compilar APK Final
on: [push]

jobs:
  construir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extrair Pastas
        run: |
          # Extrai apenas o que é necessário para o app
          unzip -o cliente.zip || true
          unzip -o compartilhado.zip || true
          # Garante que a pasta patches exista mesmo que vazia para não dar erro
          mkdir -p patches

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalação Limpa (Sem Patches)
        run: |
          npm install -g pnpm
          # --no-frozen-lockfile: ignora as regras rígidas do seu lock atual
          # --ignore-scripts: pula a aplicação do patch do 'wouter' que está falhando
          pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build do Front-end
        run: |
          # Tenta gerar a pasta dist. Se falhar, usa a pasta cliente bruta
          pnpm run build || mkdir -p dist

      - name: Preparar Capacitor
        run: |
          pnpm add @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          mkdir -p dist
          # Move o que estiver no cliente para a pasta de build do Android
          cp -r cliente/* dist/ 2>/dev/null || true
          npx cap init "MeuApp" "com.meu.app" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Gerar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Baixe o APK aqui
        uses: actions/upload-artifact@v4
        with:
          name: meu-aplicativo-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
